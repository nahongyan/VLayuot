
win32-msvc {
    # 1. 解决乱码：强制 MSVC 使用 UTF-8 编译并输出
    # /source-charset:utf-8 告诉编译器源码是 UTF-8
    # /execution-charset:utf-8 告诉编译器生成的可执行文件和输出信息使用 UTF-8
    QMAKE_CFLAGS += /utf-8
    QMAKE_CXXFLAGS += /utf-8

    # 2. 结合你之前的 sccache 配置
    # SCCACHE_PATH = $$system_path($$PWD/tools/sccache.exe)
    # QMAKE_CXX = "$$SCCACHE_PATH" cl
    # QMAKE_CC = "$$SCCACHE_PATH" cl

    # 3. 必须项：MSVC + sccache 必须使用 /Z7 嵌入调试信息，否则无法缓存
    QMAKE_CFLAGS_RELEASE -= -Zi
    QMAKE_CFLAGS_RELEASE += -Z7
    QMAKE_CXXFLAGS_RELEASE -= -Zi
    QMAKE_CXXFLAGS_RELEASE += -Z7
    
    QMAKE_CFLAGS_DEBUG -= -Zi
    QMAKE_CFLAGS_DEBUG += -Z7
    QMAKE_CXXFLAGS_DEBUG -= -Zi
    QMAKE_CXXFLAGS_DEBUG += -Z7
    QMAKE_LFLAGS += /INCREMENTAL:NO
}
